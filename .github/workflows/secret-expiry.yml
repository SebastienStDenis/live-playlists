name: Secret expiry

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: python3 .github/scripts/check_secret_expiry.py
      - if: steps.check.outputs.alert == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ steps.check.outputs.title }}
          BODY_FILE: ${{ steps.check.outputs.body_file }}
        run: |
          gh label create secret-expiry --color FBCA04 --description "Credential nearing expiry" --force
          existing=$(gh issue list --label secret-expiry --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$TITLE" --body-file "$BODY_FILE"
          else
            gh issue create --label secret-expiry --title "$TITLE" --body-file "$BODY_FILE"
          fi
