<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- The bot-account avatar's mark at tab size. Palette, grille and the N's
       cap-height sizing mirror brand/avatar.html; the path is Geist N at
       wght 560. Re-derive from there if the mark or the tokens change. -->
  <style>
    .bg { fill: #f8f5f1 }
    .mark { fill: #6c4939 }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #140e0b }
      .mark { fill: #cfaa7f }
    }
  </style>
  <defs>
    <pattern id="grille" width="8.3333" height="8.3333" patternUnits="userSpaceOnUse">
      <circle class="mark" cx="4.1667" cy="4.1667" r="0.75" opacity="0.7" />
    </pattern>
  </defs>
  <rect class="bg" width="100" height="100" />
  <rect width="100" height="100" fill="url(#grille)" />
  <path class="mark" d="M27.87 77V23H38.99L62.92 65.01V23H72.13V77H60.7L37.08 36.1V77Z" />
</svg>
