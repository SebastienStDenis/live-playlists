# Render Blueprint for the FastAPI api and the Temporal worker
services:
  - type: web
    name: next-fm-api
    runtime: docker
    plan: starter
    region: ohio
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    # Runs once per deploy (not per replica).
    preDeployCommand: uv run alembic upgrade head
    envVars:
      - fromGroup: next-fm

  - type: worker
    name: next-fm-worker
    runtime: docker
    plan: starter
    region: ohio
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: uv run python -m app.worker
    envVars:
      - fromGroup: next-fm
